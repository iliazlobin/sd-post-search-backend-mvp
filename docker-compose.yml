# Post Search MVP — docker-compose
# Slug: post-search
#
# Full stack: FastAPI app + PostgreSQL 16 with FTS.
# Per MVP design decisions:
#   D1: Postgres FTS is the index — no Elasticsearch.
#   D2: Synchronous indexing via generated tsvector — no Kafka.
#
# Start:   docker compose up --build -d
# Stop:    docker compose down
# Logs:    docker compose logs -f
#
# Both services have Docker HEALTHCHECKs; compose waits for postgres to
# be healthy before starting app. The app port is configurable via APP_PORT.

services:
  db:
    image: postgres:16-alpine
    container_name: post-search-db
    environment:
      POSTGRES_USER: postsearch
      POSTGRES_PASSWORD: postsearch
      POSTGRES_DB: postsearch
    # Postgres is NOT published to the host by default — the app talks
    # over the compose network. Uncomment only if you need to connect
    # from a host tool (psql, pgAdmin, etc.):
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postsearch"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - post-search-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: post-search-app
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postsearch:postsearch@db:5432/postsearch"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
    ports:
      - "${APP_PORT:-8050}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - post-search-net

networks:
  post-search-net:
    driver: bridge

volumes:
  pgdata:
